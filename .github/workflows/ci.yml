name: CI (minimal)

on:
  push:
    branches: [main, dev]
    paths-ignore: ["site/**"]
  pull_request:
    branches: [main, dev]
    paths-ignore: ["site/**"]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout (with LFS)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Ensure Git LFS & force blob checkout
        run: |
          set -euxo pipefail
          if ! command -v git-lfs >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y git-lfs
          fi
          git lfs install --local
          # Garanta blobs reais (não ponteiros) para o dataset
          git lfs fetch --include="data/instances/synthetic/*" --exclude=""
          git lfs pull  --include="data/instances/synthetic/*" --exclude=""
          git lfs checkout --include="data/instances/synthetic/*"

      - name: GZIP sanity (magic 1f8b)
        run: |
          set -e
          shopt -s nullglob
          files=(data/instances/synthetic/*.json.gz)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No *.json.gz under data/instances/synthetic" >&2
            exit 2
          fi
          for f in "${files[@]}"; do
            magic=$(head -c 2 "$f" | xxd -p -l 2)
            echo "$f magic=$magic"
            if [ "$magic" != "1f8b" ]; then
              echo "Not a gzip blob (looks like LFS pointer): $f" >&2
              exit 2
            fi
          done

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            pyproject.toml
            setup.cfg
            setup.py

      - name: System deps (METIS for gpmetis)
        run: |
          sudo apt-get update
          sudo apt-get install -y metis
          gpmetis -h | head -n1 || true

      - name: Install Python deps (pip only)
        run: |
          python -m pip install --upgrade pip
          pip install -U pytest
          pip install .

      - name: Run tests
        env:
          OMP_NUM_THREADS: "1"
          OPENBLAS_NUM_THREADS: "1"
          MKL_NUM_THREADS: "1"
        run: pytest -q -k "not (kahip or solvers_external)"
